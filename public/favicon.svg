<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Watch band top -->
  <rect x="22" y="2" width="20" height="14" rx="4" fill="#4361ee"/>
  <!-- Watch band bottom -->
  <rect x="22" y="48" width="20" height="14" rx="4" fill="#4361ee"/>
  <!-- Watch body -->
  <circle cx="32" cy="32" r="22" fill="#fff" stroke="#2d3436" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="18.5" fill="none" stroke="#dfe6e9" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="32" y1="15" x2="32" y2="18" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="49" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="32" x2="18" y2="32" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="49" y2="32" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <!-- Small tick marks -->
  <circle cx="40.5" cy="17.5" r="1" fill="#636e72"/>
  <circle cx="46.5" cy="23.5" r="1" fill="#636e72"/>
  <circle cx="46.5" cy="40.5" r="1" fill="#636e72"/>
  <circle cx="40.5" cy="46.5" r="1" fill="#636e72"/>
  <circle cx="23.5" cy="46.5" r="1" fill="#636e72"/>
  <circle cx="17.5" cy="40.5" r="1" fill="#636e72"/>
  <circle cx="17.5" cy="23.5" r="1" fill="#636e72"/>
  <circle cx="23.5" cy="17.5" r="1" fill="#636e72"/>
  <!-- Hour hand (pointing to 10) -->
  <line x1="32" y1="32" x2="24" y2="21" stroke="#2d3436" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 2) -->
  <line x1="32" y1="32" x2="42" y2="20" stroke="#4361ee" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#4361ee"/>
  <!-- Watch crown (button on right side) -->
  <rect x="53" y="29" width="5" height="6" rx="1.5" fill="#2d3436"/>
</svg>
